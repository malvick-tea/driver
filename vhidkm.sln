#
# vhidkm solution.
#
# The solution groups the two kernel-mode driver projects that make
# up the virtual HID keyboard-and-mouse stack:
#
#   bus\vusbbus.vcxproj    Virtual USB bus driver (root-enumerated
#                          FDO + USB-looking child PDO).
#   hid\vhidkm.vcxproj     HID minidriver that binds on the bus
#                          driver's PDO and feeds hidclass.sys.
#
# User-mode SDK / demo projects live under user\ and are not part of
# this solution; they compile and link against the public headers in
# common\ and do not share build dependencies with the drivers, so
# they are kept in a separate solution (user\vhid_user.sln) to keep
# driver-only builds fast. Adding the user projects here is safe if
# desired — update projectDependencies below so the user SDK does
# not build ahead of the drivers.
#
# Solution Items folder surfaces the cross-cutting documentation and
# configuration files in Solution Explorer. Those items are not
# compiled; they are editable from inside Visual Studio for
# convenience.
#
